    <title>MR YOU</title>
    <script>
      // Suppress benign Vite WebSocket errors in AI Studio environment
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened.' ||
          (typeof event.reason === 'string' && event.reason.includes('failed to connect to websocket'))
        )) {
          event.preventDefault();
          // Log as warning instead of error to keep console cleaner
          console.warn('Suppressed benign Vite HMR error:', event.reason);
        }
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => console.log('SW registered:', registration))
            .catch(error => console.log('SW registration failed:', error));
        });
      }
    </script>

          <div id="debug-info" style="font-size: 10px; margin-top: 20px; color: #333;">
            Loading...
          </div>
        </div>
      </div>
    </div>
    <script>
      // Immediate error catching
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('debug-info').innerHTML = 'Error: ' + msg + ' at ' + line + ':' + col;
        document.getElementById('debug-info').style.color = '#ff4444';
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
